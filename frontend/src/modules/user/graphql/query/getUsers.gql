query GetUsers($filters: UsersPermissionsUserFiltersInput, $pagination: PaginationArg, $sort: [String]) {
  usersPermissionsUsers(filters: $filters, pagination: $pagination, sort: $sort) {
    data {
      id
      attributes {
        bio
        name
        # TODO add email
        # email
        extId
        displayName
        profileLink
        profilePicture
      }
    }
  }
}
