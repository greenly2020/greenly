name: Deploy FRONTEND to VPS (dev)

on: workflow_dispatch

env:
  BRANCH: main
  REACT_APP_ENV: 'prod'
  REACT_APP_DEVELOPMENT_API_URL: ${{ vars.DEV_REACT_APP_DEVELOPMENT_API_URL }}
  REACT_APP_PRODUCTION_API_URL: ${{ vars.DEV_REACT_APP_PRODUCTION_API_URL }}
  BASE_URL: ${{ vars.DEV_BASE_URL }}
  BASE_API_URL: ${{ vars.DEV_BASE_API_URL }}
  GRAPHQL_API: ${{ vars.DEV_GRAPHQL_API }}
  NEXTAUTH_URL: ${{ vars.DEV_NEXTAUTH_URL }}

  NEXTAUTH_SECRET: ${{ secrets.DEV_NEXTAUTH_SECRET }}
  NEXT_PUBLIC_FIREBASE_API_KEY: ${{ secrets.DEV_NEXT_PUBLIC_FIREBASE_API_KEY }}
  NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets.DEV_NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }}
  NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.DEV_NEXT_PUBLIC_FIREBASE_PROJECT_ID }}
  NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ${{ secrets.DEV_NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET }}
  NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.DEV_NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
  NEXT_PUBLIC_FIREBASE_APP_ID: ${{ secrets.DEV_NEXT_PUBLIC_FIREBASE_APP_ID }}
  NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID: ${{ secrets.DEV_NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID }}
  NEXT_PUBLIC_FIREBASE_CLIENT_EMAIL: ${{ secrets.DEV_NEXT_PUBLIC_FIREBASE_CLIENT_EMAIL }}
  NEXT_PUBLIC_FIREBASE_PRIVATE_KEY: ${{ secrets.DEV_NEXT_PUBLIC_FIREBASE_PRIVATE_KEY }}

jobs:
  update-server:
    runs-on: ubuntu-latest
    steps:
      - name: Pull changes to server
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            cd ${{ vars.DEV_PATH_TO_DEPLOY }}
            branch=$(git rev-parse --abbrev-ref HEAD)   # chech current branch
            echo "Current branch is $branch"
            if [[ "$branch" != "${{ env.BRANCH }}" ]]; then           
              git checkout ${{ env.BRANCH }}
            fi
            git fetch --all
            git reset --hard origin/${{ env.BRANCH }}
            git pull https://${{ secrets.GIT_USER }}:${{ secrets.GIT_PASSWORD }}@github.com/greenly2020/greenly ${{ env.BRANCH }}

      - name: Install deps in server
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            cd ${{ vars.DEV_PATH_TO_DEPLOY }}/frontend
            export NVM_DIR=~/.nvm
            source ~/.nvm/nvm.sh
            npm install --legacy-peer-deps

  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '16.x'

      - name: Checkout code
        uses: actions/checkout@v2

      - name: Install npm dependencies
        run: |
          cd frontend
          npm install --legacy-peer-deps && npm run codegen-dev

      - name: Run build task
        run: |
          cd frontend
          npm run build --if-present

      - name: Delete previos build in server
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            if [ -d '${{ vars.DEV_PATH_TO_DEPLOY }}/frontend/build' ]; then
              echo "Build finded! EXTERMINATE!!!!"
              rm -rf ${{ vars.DEV_PATH_TO_DEPLOY }}/frontend/build
            else
              echo "Build not exist. Continue working"
            fi

      - name: Deploy Build to Server
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT }}
          source: 'frontend/.next,frontend/public'
          target: ${{ vars.DEV_PATH_TO_DEPLOY }}

  restart-pm2-service-shop:
    runs-on: ubuntu-latest
    needs: [build-frontend, update-server]
    steps:
      - name: Restart PM2 service
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            export NVM_DIR=~/.nvm
            source ~/.nvm/nvm.sh
            cd ${{ vars.DEV_PATH_TO_DEPLOY }}
            echo "Restart service"
            pm2 restart ecosystem.config.js --only dev.frontend.greenly.co
