name: Deploy BACKEND to VPS (dev)

on: workflow_dispatch

env:
  BUILD_PATH: ${{ vars.DEV_PATH_TO_DEPLOY }}/backend
  BRANCH: main

jobs:
  update-server:
    runs-on: ubuntu-latest
    steps:
      - name: Pull changes in dev server
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            cd ${{ vars.DEV_PATH_TO_DEPLOY }}
            branch=$(git rev-parse --abbrev-ref HEAD)   # chech current branch
            echo "Current branch is $branch"
            if [[ "$branch" != "${{ env.BRANCH }}" ]]; then
              git checkout ${{ env.BRANCH }}
            fi
            git fetch --all
            git reset --hard origin/${{ env.BRANCH }}
            git pull https://${{ secrets.GIT_USER }}:${{ secrets.GIT_PASSWORD }}@github.com/greenly2020/greenly ${{ env.BRANCH }}

      - name: Install deps in dev server
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            cd ${{ vars.DEV_PATH_TO_DEPLOY }}/backend
            export NVM_DIR=~/.nvm
            source ~/.nvm/nvm.sh
            npm install

  build-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20.x'

      - name: Checkout code
        uses: actions/checkout@v2

      - name: Install npm dependencies
        run: |
          cd backend
          ls
          npm install

      - name: create-json
        id: create-json
        uses: jsdaniell/create-json@1.1.2
        with:
          name: 'greenly-9aa89-af594bbda610.json'
          json: ${{ secrets.FIREBASE_JSON }}
          dir: 'backend/'

      - name: Run build task
        run: |
          cd backend
          npm run strapi build --if-present

      - name: Deploy Build to Server
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT }}
          source: 'backend/dist'
          target: ${{ vars.DEV_PATH_TO_DEPLOY }}

  Restart-PM2-service:
    runs-on: ubuntu-latest
    needs: [build-backend, update-server]
    steps:
      - name: Restart PM2 service
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            export NVM_DIR=~/.nvm
            source ~/.nvm/nvm.sh
            cd ${{ vars.DEV_PATH_TO_DEPLOY }}
            pm2 restart ecosystem.config.js --only dev.backend.greenly.co
